{% extends 'konditerApp/base.html' %}

{% block title %}Новый пароль{% endblock %}

{% block content %}
<section class="form-page narrow">
    <div>
        <p class="eyebrow">Аккаунт</p>
        <h1>Новый пароль</h1>
    </div>
    {% if validlink %}
        <form method="post" class="form-card" data-validate-form>
            {% include 'konditerApp/includes/form_fields.html' %}
            <button type="submit">Сохранить пароль</button>
        </form>
    {% else %}
        <p class="muted">Ссылка недействительна или устарела.</p>
    {% endif %}
</section>
{% endblock %}
