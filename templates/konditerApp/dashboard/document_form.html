{% extends 'konditerApp/base.html' %}

{% block title %}Загрузка документа{% endblock %}

{% block content %}
<section class="form-page">
    <div>
        <p class="eyebrow">Документы</p>
        <h1>Загрузить файл</h1>
        <p class="muted">Разрешены doc, docx, pdf, xls, xlsx, odt, ods, txt, rtf и csv до 10 МБ.</p>
    </div>
    <form method="post" enctype="multipart/form-data" class="form-card" data-validate-form>
        {% include 'konditerApp/includes/form_fields.html' %}
        <button type="submit">Загрузить</button>
    </form>
</section>
{% endblock %}
